---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zabbix
  namespace: flux-system
spec:
  pause: true
  chart:
    spec:
      chart: zabbix
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: zabbix-community
        namespace: flux-system
  interval: 10m
  targetNamespace: monitoring
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: "zabbix"
    service:
      type: NodePort
      nodePort: 32006
    zabbixServer:
      enabled: true
      extraEnv:
        - name: ZBX_STATSALLOWEDIP
          value: "10.244.2.0/16"
      extraVolumes:
        - name: zbx-stats-allowed
          configMap:
            name: zbx-stats-allowed
      extraVolumeMounts:
        - name: zbx-stats-allowed
          mountPath: /etc/zabbix/zabbix_server.conf.d
          readOnly: true
      extraPodSpecs:
        containers:
          - name: zabbix-server
            ports:
              - containerPort: 10051
                name: zabbix-server
                protocol: TCP
    zabbixWeb:
      enabled: true
      adminUser: Admin
      adminPassword: zabbix
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: zabbix-community
  namespace: flux-system
spec:
  url: https://zabbix-community.github.io/helm-zabbix
  interval: 10m