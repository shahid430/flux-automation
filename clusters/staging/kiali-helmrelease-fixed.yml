apiVersion: v1
kind: Namespace
metadata:
  name: kiali-operator
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kiali
  namespace: flux-system
spec:
  interval: 1h
  url: https://kiali.org/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali-operator
  namespace: kiali-operator
spec:
  pause: true
  interval: 5m
  chart:
    spec:
      chart: kiali-operator
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: kiali
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: kiali-operator
  values:
    cr:
      create: true
      namespace: istio-system
      spec:
        auth:
          strategy: "token"
