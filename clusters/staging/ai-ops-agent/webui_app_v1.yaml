---
apiVersion: v1
kind: Secret
metadata:
  name: open-webui-secret
  namespace: ai-ops
type: Opaque
stringData:
  WEBUI_SECRET_KEY: "1f1ba0c144fdc0635e99d370f4cccf9b38d8d7c069ffcf45c034785fe5101eef"
  HF_TOKEN: "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"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai-ops
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.ai-ops.svc.cluster.local:11434"
            - name: USER_AGENT
              value: "open-webui-mcp"
            - name: CORS_ALLOW_ORIGIN
              value: "*"
            - name: OFFLINE_MODE
              value: "true"
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: ENABLE_PERSISTENT_CONFIG
              value: "False"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secret
                  key: WEBUI_SECRET_KEY
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: ai-ops
spec:
  type: NodePort
  selector:
    app: open-webui
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
