apiVersion: v1
kind: Namespace
metadata:
  name: outline-stack
---
apiVersion: v1
kind: Secret
metadata:
  name: outline-secrets
  namespace: outline-stack
type: Opaque
stringData:
  SECRET_KEY: "69fce8d9509faa324d529d3be087c9c86caf51790d915f050497152bcc303588"
  UTILS_SECRET: "04fcd122eb9c74a6c75ea954f9f31a9512f61006165767a55dc48a2bcb53c124"

  POSTGRES_USER: "outline"
  POSTGRES_PASSWORD: "OutlinePostgres123!"
  POSTGRES_DB: "outline"

  REDIS_PASSWORD: "OutlineRedis123!"

  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "MinioAdmin123!"
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "MinioAdmin123!"

  OPENAI_API_KEY: "replace-with-your-internal-pangu-key"

  OIDC_CLIENT_ID: "replace-me"
  OIDC_CLIENT_SECRET: "replace-me"
---
apiVersion: v1
kind: Secret
metadata:
  name: vector-secrets
  namespace: outline-stack
type: Opaque
stringData:
  VECTOR_DB_USER: "outline_vector"
  VECTOR_DB_PASSWORD: "OutlineVector123!"
  VECTOR_DB_NAME: "outline_vector"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: outline-config
  namespace: outline-stack
data:
  URL: "https://outline.apps.deem.sa"
  PORT: "3000"
  FORCE_HTTPS: "true"
  ENABLE_UPDATES: "false"
  PGSSLMODE: "disable"

  FILE_STORAGE: "s3"
  AWS_REGION: "us-east-1"
  AWS_S3_FORCE_PATH_STYLE: "true"
  AWS_S3_UPLOAD_BUCKET_NAME: "outline-data"
  AWS_S3_UPLOAD_BUCKET_URL: "http://minio:9000"
  AWS_S3_UPLOAD_MAX_SIZE: "26214400"

  DATABASE_URL: "postgres://outline:OutlinePostgres123!@postgres:5432/outline"
  REDIS_URL: "redis://:OutlineRedis123!@redis:6379/0"
  DATABASE_URL_VECTOR: "postgres://outline_vector:OutlineVector123!@vector-postgres:5432/outline_vector?sslmode=disable"

  # Internal OpenAI-compatible endpoint for Pangu
  OPENAI_URL: "https://pangu.apps.deem.sa/v1"
  # OPENAI_API_VERSION: "2024-10-21"   # uncomment only if your gateway requires it

  # Internal OIDC placeholders - replace with your IdP values
  OIDC_ISSUER_URI: "https://sso.apps.deem.sa/realms/main"
  OIDC_AUTH_URI: "https://sso.apps.deem.sa/realms/main/protocol/openid-connect/auth"
  OIDC_TOKEN_URI: "https://sso.apps.deem.sa/realms/main/protocol/openid-connect/token"
  OIDC_USERINFO_URI: "https://sso.apps.deem.sa/realms/main/protocol/openid-connect/userinfo"
  OIDC_LOGOUT_URI: "https://sso.apps.deem.sa/realms/main/protocol/openid-connect/logout"
  OIDC_USERNAME_CLAIM: "preferred_username"
  OIDC_DISPLAY_NAME: "SSO"
